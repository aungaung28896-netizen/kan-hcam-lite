<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar 2D Live</title>
    <style>
        :root { 
            --primary: #ff4757; 
            --accent: #7d5fff;
            --text-light: #ffffff; 
        }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-light); 
            margin: 0; 
            padding: 20px; 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
        }
        
        .container { 
            max-width: 500px; 
            width: 100%; 
            background: rgba(255, 255, 255, 0.08); 
            backdrop-filter: blur(15px);
            padding: 25px; 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            /* ဒီနေရာမှာ box-sizing ထည့်ပေးထားပါတယ် */
            box-sizing: border-box; 
        }
        
        h1 { 
            text-align: center; 
            font-size: 1.6rem; 
            margin-bottom: 20px; 
            color: #fff; 
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }
        
        .live-frame-wrapper { 
            width: 100%; 
            height: 400px; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid rgba(255,255,255,0.1);
            margin-bottom: 25px; 
            background: #000;
        }
        
        .live-frame-wrapper iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }

        .bet-button { 
            display: block;
            width: 100%; 
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.2rem;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255,71,87,0.4);
            /* Button အပြင်မထွက်အောင် */
            box-sizing: border-box;
        }
        
        .bet-button:hover { 
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,71,87,0.6);
            background: #ff2e43;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>✨ 2D Live Result</h1>
    
    <div class="live-frame-wrapper">
        <iframe src="https://myanmar-2d.vercel.app/" title="2D Live"></iframe>
    </div>

    <a href="https://t.me/Minmin2981" class="bet-button">ထိုးရန်</a>
</div>

</body>
</html>
